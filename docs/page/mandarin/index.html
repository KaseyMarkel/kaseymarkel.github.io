-answer{max-height:200px}.hanzi-card.revealed .hanzi-tap-hint{display:none}.hanzi-rating{display:flex;gap:10px;justify-content:center;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none}.hanzi-rating.visible{opacity:1;transform:translateY(0);pointer-events:auto}.hanzi-rating button{flex:1;padding:14px 8px;border:2px solid;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;max-width:140px}.hanzi-rating button:active{transform:scale(.96)}.hanzi-btn-again{border-color:#e74c3c;color:#e74c3c}.hanzi-btn-again:active{background:#e74c3c;color:#fff}.hanzi-btn-hard{border-color:#e67e22;color:#e67e22}.hanzi-btn-hard:active{background:#e67e22;color:#fff}.hanzi-btn-good{border-color:#27ae60;color:#27ae60}.hanzi-btn-good:active{background:#27ae60;color:#fff}.hanzi-btn-easy{border-color:#0085a1;color:#0085a1}.hanzi-btn-easy:active{background:#0085a1;color:#fff}.hanzi-intro{background:linear-gradient(135deg,#f8f9fa 0%,#fff 100%);border:2px solid #0085a1;border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 2px 12px rgba(0,133,161,.1)}.hanzi-intro-label{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#0085a1;margin-bottom:12px;font-weight:600}.hanzi-intro .hanzi-character{font-size:100px}.hanzi-intro .hanzi-pinyin{font-size:28px;margin-bottom:4px}.hanzi-intro .hanzi-meaning{font-size:20px;margin-bottom:16px}.hanzi-story{font-size:15px;color:#555;line-height:1.6;text-align:left;background:#fff;padding:16px;border-radius:10px;border:1px solid #e8e8e8;margin-bottom:20px}.hanzi-story-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:6px;font-weight:600}.hanzi-intro-btn{display:block;width:100%;padding:14px;background:#0085a1;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s}.hanzi-intro-btn:active{background:#006b82}.hanzi-done{text-align:center;padding:60px 24px}.hanzi-done-icon{font-size:48px;margin-bottom:16px}.hanzi-done h2{color:#27ae60;margin:0 0 8px;font-size:22px}.hanzi-done p{color:#888;font-size:15px;margin:0}.hanzi-progress{height:4px;background:#eee;border-radius:2px;margin-bottom:24px;overflow:hidden}.hanzi-progress-fill{height:100%;background:#0085a1;border-radius:2px;transition:width .4s ease}.hanzi-reset{text-align:center;margin-top:24px}.hanzi-reset button{background:0 0;border:none;color:#bbb;font-size:13px;cursor:pointer;text-decoration:underline;padding:8px}.hanzi-reset button:hover{color:#888}</style><div class=hanzi-app id=hanziApp><div class=hanzi-header><h1>Zhōngpath</h1><p style="color:#888;font-size:14px;margin:0 0 8px">Learn Mandarin characters through spaced repetition. 5 new characters a day, one story at a time.</p><div class=hanzi-stats><span id=statLearned>0 learned</span>
<span id=statDue>0 due</span>
<span id=statNew>0 new</span></div></div><div class=hanzi-progress><div class=hanzi-progress-fill id=progressFill></div></div><div class=hanzi-card-area id=cardArea></div><div class=hanzi-reset><button onclick=resetApp()>Reset progress</button></div></div><script>(function(){const t=[{char:"的",pinyin:"de",meaning:"possessive particle (like 's)",story:'A white (白) ladle (勺) — imagine scooping up ownership. "This is the ladle OF the white chef." The glue word of Chinese, connecting descriptions to nouns.'},{char:"一",pinyin:"yī",meaning:"one",story:"A single brushstroke across the page. One horizon line — the simplest character there is. Just one clean, horizontal stroke."},{char:"是",pinyin:"shì",meaning:"is / to be",story:"The sun (日) stands on solid legs below. The sun simply IS — it exists, undeniable, a statement of truth anchored to the ground."},{char:"不",pinyin:"bù",meaning:"not / no",story:"A flower bud with a line blocking it from opening. It’s NOT going to bloom. The downward strokes push away, negating everything."},{char:"了",pinyin:"le",meaning:"completed action / changed state",story:"A tiny hook that snags the moment something finishes. The fish is caught — done! Add it after a verb and the action is complete."},{char:"人",pinyin:"rén",meaning:"person / people",story:"Two strokes leaning on each other like legs mid-stride. A person walking. One of the most fundamental building blocks — you’ll see this shape inside dozens of other characters."},{char:"我",pinyin:"wǒ",meaning:"I / me",story:'A hand (手) gripping a weapon (戈). "I defend myself." The ego has a spear. The most personal character — me, myself.'},{char:"在",pinyin:"zài",meaning:"at / in / exists",story:"A scholar standing on earth (土). Wherever you plant your feet, that’s where you’re AT. Existence grounded in a place."},{char:"有",pinyin:"yǒu",meaning:"have / there is",story:"A hand reaching over the moon (月). You HAVE the moon in your grasp. Possession — something exists in your hands."},{char:"他",pinyin:"tā",meaning:"he / him",story:'Person radical (亿) plus "also" (也). He is ALSO a person — just someone else standing beside you.'},{char:"这",pinyin:"zhè",meaning:"this",story:"The walking radical (辶) approaches something (文). Walking right up to it and pointing: THIS one, right here."},{char:"中",pinyin:"zhōng",meaning:"middle / center / China",story:"A line piercing straight through the center of a box. Bullseye. China calls itself 中国 — the Middle Kingdom."},{char:"大",pinyin:"dà",meaning:"big / large",story:"A person stretching their arms and legs wide. How BIG is it? THIS big! Spread your body as far as it goes."},{char:"来",pinyin:"lái",meaning:"come",story:"A tree with extra branches waving you over. Come here, come closer! The branches beckon."},{char:"上",pinyin:"shàng",meaning:"up / above / on top",story:'A vertical stroke reaching above a baseline, with a small dash on top saying "look UP here!" The opposite of 下 (down).'},{char:"国",pinyin:"guó",meaning:"country / nation",story:"Jade (玉) locked inside walls (囗). A country is precious treasure protected within borders."},{char:"个",pinyin:"gè",meaning:"general measure word",story:"A tiny umbrella over a person. Used to count individual things — one of this, three of that. The default counter when no special one applies."},{char:"到",pinyin:"dào",meaning:"arrive / reach / to",story:"Reaching (至) with a knife (刂) cutting through the last obstacle. You’ve finally ARRIVED at your destination."},{char:"说",pinyin:"shuō",meaning:"say / speak",story:"The speech radical (讠) on the left — an open mouth ready to SPEAK. Words pour out the right side."},{char:"们",pinyin:"men",meaning:"plural people marker",story:"A person (亿) at a door (门). Open the door — there’s not just one, there are MANY of them inside. Add it to make pronouns plural."},{char:"为",pinyin:"wèi",meaning:"for / because / to do",story:"A hand doing work with purpose. Everything is done FOR a reason. One of the most versatile words in Chinese."},{char:"子",pinyin:"zǐ",meaning:"child / son / suffix",story:"A baby with arms reaching out from swaddling cloth. A little CHILD wanting to be held. Also used as a common suffix on nouns."},{char:"和",pinyin:"hé",meaning:"and / harmony / peace",story:"Grain (禾) plus mouth (口). When there’s food AND mouths to feed, there is harmony. The word for peaceful coexistence."},{char:"你",pinyin:"nǐ",meaning:"you",story:"Person radical (亿) pointing across at another little figure. I’m looking at YOU — the person across from me."},{char:"地",pinyin:"dì",meaning:"earth / ground / land",story:'Earth radical (土) on the left, "also" (也) on the right. The ground is ALSO beneath us, always. Solid earth everywhere.'},{char:"也",pinyin:"yě",meaning:"also / too",story:'A curving scorpion tail. "The scorpion ALSO has a stinger." You’ll see this component inside many other characters like 他, 她, and 地.'},{char:"时",pinyin:"shí",meaning:"time / hour",story:"Sun radical (日) plus inch (寸). The sun moves an inch at a TIME. Each hour, the shadow shifts."},{char:"道",pinyin:"dào",meaning:"way / path / principle",story:"Walking radical (辶) plus head/chief (首). The chief walks along the WAY. Also the “Dao” of Daoism — the path of all things."},{char:"出",pinyin:"chū",meaning:"go out / exit",story:"Two mountains stacked, pushing OUT and upward. Climbing up and OUT of the valley into the open."},{char:"会",pinyin:"huì",meaning:"can / meeting / will",story:"A roof over clouds (云). People gather under one roof — they CAN have a MEETING. Also means ability."},{char:"对",pinyin:"duì",meaning:"correct / toward / pair",story:"Left side is “again” (又), right is inch (寸). Measure again, inch by inch, to make sure it’s CORRECT."},{char:"就",pinyin:"jiù",meaning:"then / just / at once",story:"A tall capital city (京) with a crouching dog. Go to the capital, THEN you’ll find what you need. Implies immediacy."},{char:"要",pinyin:"yào",meaning:"want / need / will",story:"West (西) on top, woman (女) below. A woman looking west, WANTING something on the horizon. Desire and necessity."},{char:"下",pinyin:"xià",meaning:"down / below / under",story:"A line with a stroke hanging DOWN below it. The mirror of 上 (up). Everything underneath, below, going down."},{char:"以",pinyin:"yǐ",meaning:"with / by means of / in order to",story:"A person leaning on a support. BY MEANS OF that support, they stand tall. A tool word for expressing method."},{char:"生",pinyin:"shēng",meaning:"life / birth / grow",story:"A sprout pushing up from the ground with a horizontal line of earth. New LIFE is BORN — growth from nothing."},{char:"能",pinyin:"néng",meaning:"can / able / capable",story:"A bear’s body with powerful claws. A bear CAN do anything with that strength. Raw capability."},{char:"自",pinyin:"zì",meaning:"self / from / since",story:"Looks like a nose. In Chinese culture, you point at your nose to mean “me, mySELF.” The character for self-identity."},{char:"什",pinyin:"shén",meaning:"what (in 什么)",story:"Person (亿) plus ten (十). A person asking ten questions: WHAT? WHAT? WHAT? Always paired with 么 to form 什么 (what)."},{char:"么",pinyin:"me",meaning:"question particle (in 什么)",story:"A tiny trailing stroke, like the tail end of a question hanging in the air. The little suffix that makes things into questions."},{char:"学",pinyin:"xué",meaning:"learn / study",story:"Hands above a child (子). Hands guiding a child as they LEARN. Knowledge passed down through touch and teaching."},{char:"开",pinyin:"kāi",meaning:"open / start / turn on",story:"Two hands lifting a horizontal bar. Using both hands to OPEN the gate. Also means to start or begin something."},{char:"过",pinyin:"guò",meaning:"pass / cross / (experience)",story:"Walking radical (辶) carrying something across. Walking PAST, crossing over. Used after verbs to show you’ve done something before."},{char:"没",pinyin:"méi",meaning:"not have / didn't",story:"Water radical (氵) drowning something. It sank beneath the water — now you DON’T HAVE it anymore."},{char:"那",pinyin:"nà",meaning:"that / those",story:"The counterpart to 这 (this). Points away: over THAT way, in THAT place. Far from here, far from this."},{char:"可",pinyin:"kě",meaning:"can / may / approve",story:"A mouth (口) beneath a crooked hook. Open your mouth and say “yes, you MAY.” Permission granted."},{char:"好",pinyin:"hǎ o",meaning:"good / well / fine",story:"Woman (女) plus child (子). A mother with her child — that’s GOOD. The most basic expression of something being fine."},{char:"年",pinyin:"nián",meaning:"year",story:"Grain being harvested under the sun. One full harvest cycle equals one YEAR. The rhythm of agriculture marking time."},{char:"多",pinyin:"duō",meaning:"many / much / more",story:"Two evening moons (夕夕) stacked on top of each other. So MANY evenings piled up, one after another."},{char:"些",pinyin:"xiē",meaning:"some / a few",story:'"This" (此) sitting on a base. Just THIS much — SOME, not all. A modest portion, a handful.'},{char:"样",pinyin:"yàng",meaning:"appearance / manner / type",story:"Wood (木) plus sheep (羊). A wooden sheep — what MANNER of creature is this? Used to describe how things look or what kind they are."},{char:"如",pinyin:"rú",meaning:"like / as if / if",story:"Woman (女) plus mouth (口). A woman speaks AS IF she knows the truth. Comparison and supposition."},{char:"她",pinyin:"tā",meaning:"she / her",story:"Woman radical (女) plus “also” (也). SHE is also a person — the feminine counterpart to 他 (he). Same sound, different radical."},{char:"着",pinyin:"zhe",meaning:"ongoing action particle",story:"Sheep (羊) with an eye (目) watching. A sheep staring continuously — the action is ONGOING, still happening right now."},{char:"得",pinyin:"de / dé",meaning:"get / obtain / (complement particle)",story:"Step (彳) plus sun (日) plus inch (寸). Step by step, day by day, inch by inch — you GET there eventually."},{char:"里",pinyin:"lǐ",meaning:"inside / within / mile",story:"Field (田) plus earth (土). Earth INSIDE a field — what’s buried IN there? The interior, the within."},{char:"后",pinyin:"hòu",meaning:"after / behind / later",story:"A person walking with someone trailing BEHIND. AFTER you go first, I’ll follow. The back, the later."},{char:"小",pinyin:"xiǎ o",meaning:"small / little",story:"A tiny thing being divided into even tinier pieces — three small strokes. SMALL. The opposite of 大 (big)."},{char:"天",pinyin:"tiān",meaning:"sky / day / heaven",story:"One (一) above big (大). What’s above even the biggest person? The SKY. Also means day and heaven."},{char:"面",pinyin:"miàn",meaning:"face / surface / side",story:"A framed FACE with features inside. The surface you show the world — your FACE, or the side of anything."},{char:"去",pinyin:"qù",meaning:"go / leave / remove",story:"Earth (土) with legs walking away from it. Leave the ground and GO. Departure, moving away."},{char:"还",pinyin:"hái",meaning:"still / yet / also",story:"Walking radical (辶) with “not” (不). Walking but not finished — STILL going, not done YET."},{char:"日",pinyin:"rì",meaning:"sun / day / date",story:"A rectangle with a line through the middle — the SUN. One of the oldest pictographs, drawn for thousands of years."},{char:"看",pinyin:"kàn",meaning:"look / see / watch",story:"Hand (手) above eye (目). Put your hand over your eyes like a visor to LOOK into the distance. Shading your eyes to SEE."},{char:"都",pinyin:"dōu",meaning:"all / both / every",story:"A person (者) standing at the city walls (阝). ALL the people in the city, every single one."},{char:"两",pinyin:"liǎ ng",meaning:"two (quantity) / both",story:"TWO identical pieces inside a frame. Used for counting pairs and quantities — two of something specific."},{char:"起",pinyin:"qǐ",meaning:"rise / get up / start",story:"Walk (走) plus self (己). Walk yourself upright — RISE up and get going. The start of action."},{char:"把",pinyin:"bǎ",meaning:"grasp / hold / (object marker)",story:"Hand radical (扌) reaching out to grab. GRASP it with your hand, take HOLD. Also a grammar word that brings the object forward."},{char:"而",pinyin:"ér",meaning:"and / but / yet",story:"Looks like a beard hanging down from a chin. He had a beard AND a mustache, BUT no hair on top. A connector with contrast."},{char:"行",pinyin:"xíng / háng",meaning:"walk / OK / row / profession",story:"Two people walking on a crossroads. WALK along — it’ll be OK. Also means a row or a line of work."},{char:"方",pinyin:"fāng",meaning:"square / direction / method",story:"A perfect SQUARE shape with a flag on top. Pointing in every DIRECTION. Also means method or way of doing things."},{char:"想",pinyin:"xiǎ ng",meaning:"think / want / miss",story:"Mutual/appearance (相) above heart (心). Your heart examines what it sees and THINKS. Also means to miss someone."},{char:"与",pinyin:"yǔ",meaning:"and / with / give",story:"Two hooks linked together. Hooked together WITH each other — joined, connected, given."},{char:"间",pinyin:"jiān",meaning:"between / room / space",story:"Sun (日) peeking through a door (门). Sunlight slipping BETWEEN the doors of a ROOM. The space in between."},{char:"高",pinyin:"gāo",meaning:"tall / high",story:"A tall pavilion building with a peaked roof reaching HIGH. A tower stretching toward the sky. Lofty, elevated."},{char:"头",pinyin:"tóu",meaning:"head / top / first",story:"Dots on top like hair on a HEAD. The top of everything — the first, the beginning, the leader."},{char:"经",pinyin:"jīng",meaning:"pass through / scripture / already",story:"Silk radical (纟) with a path winding through. Threading silk THROUGH the needle — already been THROUGH it. Also means classic texts."},{char:"长",pinyin:"cháng / zhǎ ng",meaning:"long / grow / elder",story:"A person with flowing LONG hair trailing behind them. Over time, hair GROWs. An elder whose hair has grown long."},{char:"发",pinyin:"fā / fà",meaning:"send / emit / hair",story:"Legs running to SEND a message, to emit energy outward. Also means HAIR (pronounced fà) — what grows from your head."},{char:"家",pinyin:"jiā",meaning:"home / family / expert",story:
