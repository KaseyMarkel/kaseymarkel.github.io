function normcdf(x, mean, sd) {
  const z = (x - mean) / sd;
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const d = 0.3989422804 * Math.exp(-z * z / 2);
  const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.8212560 + t * 1.3302744))));
  return z > 0 ? 1 - p : p;
}

function sampleTriangular(min, mode, max) {
  const u = Math.random();
  const fc = (mode - min) / (max - min);
  if (u < fc) return min + Math.sqrt(u * (max - min) * (mode - min));
  return max - Math.sqrt((1 - u) * (max - min) * (max - mode));
}

function percentile(arr, p) {
  const sorted = [...arr].sort((a, b) => a - b);
  const idx = (p / 100) * (sorted.length - 1);
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  return lo === hi ? sorted[lo] : sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}

function getMCParams(version) {
  if (version === 'v8') {
    return MC_PARAMS_BASE.map(p => MC_V8_OVERRIDES[p.key] ? {...p, ...MC_V8_OVERRIDES[p.key]} : p)
      .filter(p => !(p.key === 'market_spillover' && p.mode === 0));
  }
  if (version === 'combined') {
    return MC_PARAMS_BASE.map(p => MC_COMBINED_OVERRIDES[p.key] ? {...p, ...MC_COMBINED_OVERRIDES[p.key]} : p);
  }
  return MC_PARAMS_BASE;
}

function runMonteCarlo(baseParams, version, nIterations) {
  const mcParams = getMCParams(version);
  const results = { dalys:[], dollars:[], bcr:[], wellbys:[], costPerDaly:[], costPerWellby:[], wellbyBcr:[] };
  for (let i = 0; i < nIterations; i++) {
    const sampled = {...baseParams};
    for (const p of mcParams) {
      sampled[p.key] = sampleTriangular(p.min, p.mode, p.max);
    }
    const m = computeModel(sampled, version);
    results.dalys.push(m.totalDalys);
    results.dollars.push(m.totalDollars);
    results.bcr.push(m.bcrDollar);
    results.wellbys.push(m.totalWellbys);
    results.costPerDaly.push(m.dollarPerDaly);
    results.costPerWellby.push(m.dollarPerWellby);
    results.wellbyBcr.push(m.bcrWellby);
  }
  return results;
}

  iron_infant: 'Christian Table 2: micronutrient supplementation reduced LBW by 16% in Nepal trial. We use 6% neonatal mortality reduction for LBW infants. VSLY from Viscusi Table 3 (Guatemala-adjusted).',
  iron_mh: 'Beard Table 2: iron-sufficient mothers had 25% better depression/stress scores than iron-deficient. We use 5% as a conservative population-wide anxiety/fatigue reduction for iron-deficient individuals.',
  zinc_diarrhea: 'Yakoob Table 2: preventive zinc supplementation reduced diarrhea incidence by 13% (pooled RR 0.87). We use 12% as a conservative round-down.',
  zinc_pneumonia: 'Yakoob Table 3: preventive zinc reduced pneumonia incidence by 19% (pooled RR 0.81). We use 10% as a conservative estimate accounting for biofortification vs supplementation.',
  zinc_stunting: 'Fischer Walker review: co-administration of zinc+iron reduces absorption of both minerals. HAZ effect zeroed because iron fortification in same crop antagonizes zinc uptake.',
  zinc_preterm: 'Ota Summary of Findings Table 1: zinc supplementation reduced preterm birth by 14% (RR 0.86). Applied to 160/1000 preterm baseline \u2192 ~1.3% absolute reduction.',
  zinc_mh: 'Lai meta-analysis of 3 RCTs: zinc supplementation reduced depression scores (pooled effect significant). We apply 5% mood/anxiety improvement among zinc-deficient adults.',
  yield_income: 'Semilla Nueva field trial data 2023: biofortified varieties yield $108/yr additional profit per farmer vs conventional. Bouis & Saltzman confirm yield advantage is typical of HarvestPlus varieties.',
  income_healthcare: 'Wagstaff analysis: lower income is associated with higher hospitalization rates. We estimate 12% reduction in healthcare costs from $108/yr income gain.',
  income_mh: 'Ridley review: poverty causally worsens depression/anxiety. We apply 0.06 SD well-being improvement per income gain. WELLBY conversion via Frijters & Krekel Ch. 4 methodology.',
  income_nextgen: 'Chetty Figure V: rank-rank slope of 0.34 for intergenerational income mobility. We use 0.05% of lifetime earnings ($25k) as the marginal next-generation benefit of $108/yr income gain.',
  market_spillover: 'Farmers sell ~50% of harvest into general market. Biofortified corn gets mixed into supply, reaching non-farm consumers at diluted doses. Spillover factor × sum of all nutritional pathway benefits.',
};

function computeModel(P, version) {
  const isV8 = version === 'v8';
  const wellbys_per_ly = P.guatemala_ls - P.neutral_point;
  const pv = (yrs) => 1 / Math.pow(1 + P.discount_rate, yrs);
  const adopt = P.adoption_rate;
  const baseline_stunting = normcdf(P.haz_threshold, P.mean_haz, P.sd_haz);
  function stuntingCases(haz_shift) {
    const post = normcdf(P.haz_threshold, P.mean_haz + haz_shift, P.sd_haz);
    return (baseline_stunting - post) * P.children_under_5;
  }
  const pathways = [];

  // Each pathway now includes: central, units, subgroup_desc, subgroup_n, baseline_rate, formula_note, dollar_per_unit
  // Row 4: Protein → Stunting
  { const raw = stuntingCases(P.protein_haz) * adopt; const adj = raw;
    const dalys = adj * P.stunting_dw; const dollars = adj * P.dollar_per_stunting;
    const ls = P.ls_per_01_haz * P.protein_haz / 0.1;
    pathways.push({ id:'protein_stunting', cat:'protein', intervention:'Protein quality', outcome:'Stunting',
      central: P.protein_haz, units:'HAZ shift', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate: (baseline_stunting*1000).toFixed(0)+'/1000',
      formula_note: 'NORMDIST(\u22122, \u03bc+HAZ, 1) shift', dollar_per_unit: P.dollar_per_stunting,
      raw, overlap:0, adj, daly_wt:P.stunting_dw, pv_f:1.0, dalys, dollars, confidence:'Strong', ls, wellby_dur:40, wellbys: adj*ls*40, new_row:false }); }

  // Row 5: Protein → Future Salary (IQ)
  { const raw = P.children_0_24mo * adopt; const adj = raw;
    const du = P.protein_iq_raven * P.raven_to_iq * P.earnings_per_iq * P.lifetime_earnings; const pvf = pv(18);
    const dollars = adj * du * pvf;
    const ig = P.protein_iq_raven * P.raven_to_iq * P.earnings_per_iq;
    const ls = P.ls_per_income_doubling * Math.log(1+ig)/Math.log(2);
    pathways.push({ id:'protein_iq', cat:'protein', intervention:'Protein quality', outcome:'Future salary (IQ)',
      central: P.protein_iq_raven, units:'Raven pts', subgroup_desc:'Children 0\u201324mo', subgroup_n: P.children_0_24mo, baseline_rate:'\u2014',
      formula_note: 'Raven\u00d70.5\u00d72%\u00d7$25k lifetime', dollar_per_unit: du,
      raw, overlap:0, adj, daly_wt:null, pv_f:pvf, dalys:0, dollars, confidence:'Strong', ls, wellby_dur:40, wellbys: adj*ls*40*pvf, new_row:false }); }

  // Row 6: Protein → Work Capacity
  { const raw = P.working_age_adults * adopt; const adj = raw;
    const du = (P.protein_work_pct/100)*P.labor_earnings; const dollars = adj*du;
    const ls = P.ls_per_income_doubling * Math.log(1+P.protein_work_pct/100)/Math.log(2);
    pathways.push({ id:'protein_work', cat:'protein', intervention:'Protein quality', outcome:'Work capacity',
      central: P.protein_work_pct, units:'% productivity', subgroup_desc:'Working-age adults', subgroup_n: P.working_age_adults, baseline_rate:'\u2014',
      formula_note: 'Effect%\u00d7$405 labor earnings', dollar_per_unit: du,
      raw, overlap:0, adj, daly_wt:null, pv_f:1.0, dalys:0, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 7: Protein → CVD
  { const cvd_sub = isV8 ? 1000 : P.children_0_24mo;
    const cvd_baseline = isV8 ? 80/10000 : 80/1000; // V8: 80 per 10k; V10: 80 per 1k (smaller subgroup)
    const raw = (P.protein_cvd_pct/100)*cvd_baseline*cvd_sub*adopt; const adj = raw; const pvf = isV8 ? 1.0 : pv(30);
    const dalys = adj*5*pvf; const dollars = adj*5000*pvf; const ls = wellbys_per_ly*0.5;
    pathways.push({ id:'protein_cvd', cat:'protein', intervention:'Protein quality', outcome:'CVD risk',
      central: P.protein_cvd_pct, units:'% CVD reduction', subgroup_desc: isV8?'Population':'Children 0\u201324mo (DOHaD)', subgroup_n: cvd_sub, baseline_rate:'80/1000 lifetime',
      formula_note: 'Effect%\u00d7baseline\u00d7subgroup', dollar_per_unit: 5000,
      raw, overlap:0, adj, daly_wt:5, pv_f:pvf, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls*pvf, new_row:false }); }

  // Row 8: Protein → Immune
  { const raw = (P.protein_immune_pct/100)*(800/1000)*P.children_under_5*adopt; const adj = raw;
    const dalys = adj*0.05; const dollars = adj*50;
    const ls = P.ls_acute_illness*P.illness_duration_fraction;
    pathways.push({ id:'protein_immune', cat:'protein', intervention:'Protein quality', outcome:'Immune function',
      central: P.protein_immune_pct, units:'% infection reduction', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate:'800/1000 episodes/yr',
      formula_note: 'Effect%\u00d7baseline\u00d7subgroup', dollar_per_unit: 50,
      raw, overlap:0, adj, daly_wt:0.05, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 9: Food → Stunting
  { const raw = stuntingCases(P.food_haz)*adopt; const adj = raw*(1-0.15);
    const dalys = adj*P.stunting_dw; const dollars = adj*P.dollar_per_stunting;
    const ls = P.ls_per_01_haz*P.food_haz/0.1;
    pathways.push({ id:'food_stunting', cat:'food', intervention:'Total food', outcome:'Stunting',
      central: P.food_haz, units:'HAZ shift', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate: (baseline_stunting*1000).toFixed(0)+'/1000',
      formula_note: 'NORMDIST shift (2nd pathway after protein)', dollar_per_unit: P.dollar_per_stunting,
      raw, overlap:0.15, adj, daly_wt:P.stunting_dw, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:40, wellbys: adj*ls*40, new_row:false }); }

  // Row 10: Iron → Future Salary (IQ) — V11: toggle to zero if dose-extrapolation concern
  { const iqActive = P.iron_iq_include !== false;
    const raw = iqActive ? P.children_under_5*P.iron_def_children*adopt : 0; const adj = raw*(1-0.25); const pvf = pv(15);
    const du = P.iron_iq_smd*P.iq_per_sd*P.earnings_per_iq*P.lifetime_earnings; const dollars = adj*du*pvf;
    const ig = P.iron_iq_smd*P.iq_per_sd*P.earnings_per_iq;
    const ls = P.ls_per_income_doubling*Math.log(1+ig)/Math.log(2);
    pathways.push({ id:'iron_iq', cat:'iron', intervention:'Iron', outcome: iqActive ? 'Future salary (IQ)' : 'Future salary (IQ) [OFF]',
      central: P.iron_iq_smd, units:'SMD cognitive', subgroup_desc:'Fe-def children <5', subgroup_n: Math.round(P.children_under_5*P.iron_def_children), baseline_rate:'30% Fe-def',
      formula_note: iqActive ? 'SMD\u00d715 IQ/SD\u00d72%\u00d7$25k' : 'ZEROED: dose-extrapolation flag (3-5mg vs 60mg RCT)', dollar_per_unit: du,
      raw, overlap:0.25, adj, daly_wt:null, pv_f:pvf, dalys:0, dollars, confidence: iqActive ? 'Moderate' : 'Weak', ls: iqActive ? ls : 0, wellby_dur:40, wellbys: iqActive ? adj*ls*40*pvf : 0, new_row:false }); }

  // Row 11: Iron → Work Capacity
  { const raw = P.working_age_adults*P.anemia_prevalence*adopt; const adj = raw*(1-0.10);
    const du = (P.iron_work_pct/100)*P.labor_earnings; const dollars = adj*du;
    const ls = P.ls_per_income_doubling*Math.log(1+P.iron_work_pct/100)/Math.log(2);
    pathways.push({ id:'iron_work', cat:'iron', intervention:'Iron', outcome:'Work capacity (Hb)',
      central: P.iron_work_pct, units:'% productivity', subgroup_desc:'Anemic adults', subgroup_n: Math.round(P.working_age_adults*P.anemia_prevalence), baseline_rate:'22% anemia',
      formula_note: 'Effect%\u00d7$405 labor earnings', dollar_per_unit: du,
      raw, overlap:0.10, adj, daly_wt:null, pv_f:1.0, dalys:0, dollars, confidence:'Strong', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 12: Iron → Immune
  { const raw = (P.iron_immune_pct/100)*(400/1000)*P.children_under_5*adopt; const adj = raw*(1-0.10);
    const dalys = adj*0.05; const dollars = adj*50;
    const ls = P.ls_acute_illness*P.illness_duration_fraction;
    pathways.push({ id:'iron_immune', cat:'iron', intervention:'Iron', outcome:'Immune function',
      central: P.iron_immune_pct, units:'% bacterial reduction', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate:'400/1000',
      formula_note: 'Effect%\u00d7baseline\u00d7subgroup', dollar_per_unit: 50,
      raw, overlap:0.10, adj, daly_wt:0.05, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 13: Iron → Maternal Mortality
  { const raw = (P.iron_maternal_pct/100)*0.95*adopt; const adj = raw;
    const dalys = adj*28; const dollars = adj*150000; const ls = wellbys_per_ly*35+7;
    pathways.push({ id:'iron_maternal', cat:'iron', intervention:'Iron', outcome:'Maternal mortality',
      central: P.iron_maternal_pct, units:'% MMR reduction', subgroup_desc:'Population', subgroup_n: 1000, baseline_rate:'95/100k (0.95/1000)',
      formula_note: 'Effect%\u00d7MMR', dollar_per_unit: 150000,
      raw, overlap:0, adj, daly_wt:28, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 14: Iron → Infant Survival
  { const raw = (P.iron_infant_pct/100)*2.5*0.15*adopt; const infant_overlap = isV8 ? 0 : 0.25; const adj = raw*(1-infant_overlap);
    const dalys = adj*32; const dollars = adj*P.vsly;
    const ls = wellbys_per_ly*P.remaining_life_child+7;
    pathways.push({ id:'iron_infant', cat:'iron', intervention:'Iron', outcome:'Infant survival',
      central: P.iron_infant_pct, units:'% LBW death reduction', subgroup_desc:'Population', subgroup_n: 1000, baseline_rate:'2.5/1000 U5MR, 15% LBW-attrib',
      formula_note: 'Effect%\u00d7U5MR\u00d7LBW fraction', dollar_per_unit: P.vsly,
      raw, overlap:infant_overlap, adj, daly_wt:32, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 15: Iron → Mental Health
  { const subgroup = Math.round(P.working_age_adults*P.anemia_prevalence*0.20);
    const raw = isV8 ? subgroup*adopt : (P.iron_mh_pct/100)*subgroup*adopt; const adj = raw;
    const dalys = adj*0.15; const dollars = dalys*P.value_per_daly;
    const ls = P.ls_mixed;
    pathways.push({ id:'iron_mh', cat:'iron', intervention:'Iron', outcome:'Mental health',
      central: P.iron_mh_pct, units:'% anxiety/fatigue reduction', subgroup_desc:'Anemic adults w/ MH risk', subgroup_n: subgroup, baseline_rate:'20% of anemic adults',
      formula_note: 'Effect%\u00d7subgroup; DALYs\u00d7$5500', dollar_per_unit: null,
      raw, overlap:0, adj, daly_wt:0.15, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 16: Zinc → Diarrhea
  { const raw = (P.zinc_diarrhea_pct/100)*(300/1000)*P.children_under_5*adopt; const adj = raw;
    const dalys = adj*0.08; const dollars = adj*30;
    const ls = P.ls_acute_illness*P.illness_duration_fraction;
    pathways.push({ id:'zinc_diarrhea', cat:'zinc', intervention:'Zinc', outcome:'Diarrhea',
      central: P.zinc_diarrhea_pct, units:'% reduction', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate:'300/1000 episodes/yr',
      formula_note: 'Effect%\u00d7baseline\u00d7subgroup', dollar_per_unit: 30,
      raw, overlap:0, adj, daly_wt:0.08, pv_f:1.0, dalys, dollars, confidence:'Strong', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 17: Zinc → Pneumonia
  { const raw = (P.zinc_pneumonia_pct/100)*(150/1000)*P.children_under_5*adopt; const adj = raw;
    const dalys = adj*0.25; const dollars = adj*200;
    const ls = P.ls_acute_illness*P.illness_duration_fraction*2;
    pathways.push({ id:'zinc_pneumonia', cat:'zinc', intervention:'Zinc', outcome:'Pneumonia',
      central: P.zinc_pneumonia_pct, units:'% reduction', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate:'150/1000',
      formula_note: 'Effect%\u00d7baseline\u00d7subgroup', dollar_per_unit: 200,
      raw, overlap:0, adj, daly_wt:0.25, pv_f:1.0, dalys, dollars, confidence:'Strong', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 18: Zinc → Stunting (ZEROED)
  { const raw = stuntingCases(P.zinc_haz)*adopt;
    pathways.push({ id:'zinc_stunting', cat:'zinc', intervention:'Zinc', outcome:'Stunting (zeroed)',
      central: P.zinc_haz, units:'HAZ shift', subgroup_desc:'Children <5', subgroup_n: P.children_under_5, baseline_rate: (baseline_stunting*1000).toFixed(0)+'/1000',
      formula_note: 'ZEROED: Zn+Fe co-admin antagonism', dollar_per_unit: P.dollar_per_stunting,
      raw, overlap:1.0, adj:0, daly_wt:P.stunting_dw, pv_f:1.0, dalys:0, dollars:0, confidence:'Low-Mod', ls:0, wellby_dur:0, wellbys:0, new_row:false }); }

  // Row 19: Zinc → Preterm Birth (V10 only)
  if (!isV8) { const raw = (P.zinc_preterm_pct/100)*(160/1000)*P.pregnancies_per_yr*adopt; const adj = raw;
    const dalys = adj*P.preterm_dw; const dollars = dalys*P.value_per_daly;
    const ls = 0.30*(wellbys_per_ly*P.remaining_life_child+7)+0.20*P.ls_severe_preterm_disability*P.remaining_life_child;
    pathways.push({ id:'zinc_preterm', cat:'zinc', intervention:'Zinc', outcome:'Preterm birth',
      central: P.zinc_preterm_pct, units:'% preterm reduction', subgroup_desc:'Pregnancies/yr', subgroup_n: P.pregnancies_per_yr, baseline_rate:'160/1000 births',
      formula_note: 'Effect%\u00d7preterm rate\u00d7pregnancies', dollar_per_unit: null,
      raw, overlap:0, adj, daly_wt:P.preterm_dw, pv_f:1.0, dalys, dollars, confidence:'Low-Mod', ls, wellby_dur:1, wellbys: adj*ls, new_row:true }); }

  // Row 20: Zinc → Mental Health (V10 only)
  if (!isV8) { const subgroup = 20; const raw = (P.zinc_mh_pct/100)*subgroup*adopt; const adj = raw*(1-0.10);
    const dalys = adj*0.13; const dollars = dalys*P.value_per_daly;
    const ls = P.ls_mixed;
    pathways.push({ id:'zinc_mh', cat:'zinc', intervention:'Zinc', outcome:'Mental health',
      central: P.zinc_mh_pct, units:'% reduction', subgroup_desc:'Zn-def adults w/ MH risk', subgroup_n: subgroup, baseline_rate:'20 per 1000',
      formula_note: 'Effect%\u00d7subgroup; DALYs\u00d7$5500', dollar_per_unit: null,
      raw, overlap:0.10, adj, daly_wt:0.13, pv_f:1.0, dalys, dollars, confidence:'Weak', ls, wellby_dur:1, wellbys: adj*ls, new_row:true }); }

  // Row 21: Yield → Farmer Income
  { const raw = P.farmers; const adj = raw;
    const dollars = P.yield_income*adj;
    const ls = P.ls_per_income_doubling*Math.log(1+P.yield_income/P.farmer_profit)/Math.log(2);
    pathways.push({ id:'yield_income', cat:'income', intervention:'Yield', outcome:'Farmer income',
      central: P.yield_income, units:'USD/yr profit gain', subgroup_desc:'Farmers', subgroup_n: P.farmers, baseline_rate:'$255 baseline profit',
      formula_note: 'Direct: central\u00d7farmers', dollar_per_unit: P.yield_income,
      raw, overlap:0, adj, daly_wt:null, pv_f:1.0, dalys:0, dollars, confidence:'Strong', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 22: Income → Healthcare
  { const raw = (P.income_healthcare_pct/100)*200; const adj = raw;
    const dollars = adj*150; const ls = 0.02;
    pathways.push({ id:'income_healthcare', cat:'income', intervention:'Income', outcome:'Healthcare costs',
      central: P.income_healthcare_pct, units:'% hosp. reduction', subgroup_desc:'Population', subgroup_n: 1000, baseline_rate:'200/1000',
      formula_note: 'Effect%\u00d7baseline; \u00d7$150/hosp', dollar_per_unit: 150,
      raw, overlap:0, adj, daly_wt:null, pv_f:1.0, dalys:0, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 23: Income → Mental Health
  { const raw = P.farmers; const adj = raw*(1-0.05);
    const dalys = adj*P.income_mh_sd*0.1; const dollars = dalys*P.value_per_daly;
    const ls = P.income_mh_sd*2;
    pathways.push({ id:'income_mh', cat:'income', intervention:'Income', outcome:'Mental health',
      central: P.income_mh_sd, units:'SD well-being', subgroup_desc:'Farmers', subgroup_n: P.farmers, baseline_rate:'\u2014',
      formula_note: 'DALYs = I\u00d7C\u00d7J\u00d7K (effect\u00d7DW)', dollar_per_unit: null,
      raw, overlap:0.05, adj, daly_wt:0.1, pv_f:1.0, dalys, dollars, confidence:'Moderate', ls, wellby_dur:1, wellbys: adj*ls, new_row:false }); }

  // Row 24: Income → Future Salary (Next Gen)
  { const subgroup = Math.round(P.farmers*P.household_size/2); const raw = subgroup; const adj = raw;
    const pvf = pv(18); const dollars = P.income_nextgen*P.lifetime_earnings*adj*pvf;
    const annual_inc = P.income_nextgen*P.lifetime_earnings/(40*P.labor_earnings);
    const ls = P.ls_per_income_doubling*Math.log(1+annual_inc)/Math.log(2);
    pathways.push({ id:'income_nextgen', cat:'income', intervention:'Income', outcome:'Future salary (next gen)',
      central: P.income_nextgen, units:'fraction lifetime earnings', subgroup_desc:'Children in farm families', subgroup_n: subgroup, baseline_rate:'\u2014',
      formula_note: 'Fraction\u00d7$25k\u00d7children\u00d7PV', dollar_per_unit: P.income_nextgen*P.lifetime_earnings,
      raw, overlap:0, adj, daly_wt:null, pv_f:pvf, dalys:0, dollars, confidence:'Weak', ls, wellby_dur:40, wellbys: adj*ls*40*pvf, new_row:false }); }

  // Row 25: Market Spillover — farmers sell ~50% of corn into general market
  if (P.market_spillover > 0) {
    const nutritionalCats = new Set(['protein','food','iron','zinc']);
    const nutDalys = pathways.filter(p=>nutritionalCats.has(p.cat)).reduce((s,p)=>s+p.dalys, 0);
    const nutDollars = pathways.filter(p=>nutritionalCats.has(p.cat)).reduce((s,p)=>s+p.dollars, 0);
    const nutWellbys = pathways.filter(p=>nutritionalCats.has(p.cat)).reduce((s,p)=>s+p.wellbys, 0);
    const spDalys = nutDalys * P.market_spillover;
    const spDollars = nutDollars * P.market_spillover;
    const spWellbys = nutWellbys * P.market_spillover;
    pathways.push({ id:'market_spillover', cat:'income', intervention:'Market', outcome:'Spillover (non-farm consumers)',
      central: P.market_spillover, units:'fraction of farm benefit', subgroup_desc:'Market consumers', subgroup_n: '—', baseline_rate:'~50% of corn sold',
      formula_note: 'Spillover%×sum(nutritional DALYs/$)', dollar_per_unit: null,
      raw: 0, overlap:0, adj:0, daly_wt:null, pv_f:1.0, dalys:spDalys, dollars:spDollars, confidence:'Weak', ls:0, wellby_dur:0, wellbys:spWellbys, new_row:true }); }

  const cost = (1000/P.household_size)*P.cost_per_farmer;
  const totalDalys = pathways.reduce((s,p) => s+p.dalys, 0);
  const totalDollars = pathways.reduce((s,p) => s+p.dollars, 0);
  const totalWellbys = pathways.reduce((s,p) => s+p.wellbys, 0);
  const wellbyDollarValue = totalWellbys * P.guatemala_wellby_value;
  return { pathways, cost, totalDalys, totalDollars, totalWellbys, wellbyDollarValue,
    dollarPerDaly: totalDalys > 0 ? cost/totalDalys : Infinity,
    dollarPerWellby: totalWellbys > 0 ? cost/totalWellbys : Infinity,
    bcrDollar: cost > 0 ? totalDollars/cost : 0,
    bcrWellby: cost > 0 ? wellbyDollarValue/cost : 0,
  };
}

// ─── SVG STACKED BAR ───
function StackedBar({ data, label, width }) {
  const total = data.reduce((s,d) => s+d.value, 0);
  if (total === 0) return null;
  const barH = 32, h = barH + 4, w = width || 700;
  let x = 80;
  const barW = w - 100;
  const [tip, setTip] = useState(null);
  return (
    <div style={{ position: 'relative' }}>
      <svg width={w} height={h} style={{ display: 'block' }}>
        <text x={0} y={barH/2+5} fontSize={13} fill="#374151" fontWeight={500}>{label}</text>
        {data.map((d, i) => {
          const segW = (d.value / total) * barW;
          const sx = x; x += segW;
          return <rect key={i} x={sx} y={2} width={Math.max(segW - 1, 0)} height={barH} rx={i===0?4:0}
            fill={COLORS[d.cat] || '#888'}
            onMouseEnter={(e) => setTip({ x: e.clientX, y: e.clientY, name: d.name, value: d.value, pct: (d.value/total*100).toFixed(1) })}
            onMouseLeave={() => setTip(null)} style={{ cursor: 'pointer' }} />;
        })}
      </svg>
      {tip && <div className="tooltip-box" style={{ left: tip.x + 10, top: tip.y - 40, position: 'fixed' }}>
        <strong>{tip.name}</strong>: {tip.value.toFixed(2)} ({tip.pct}%)
      </div>}
    </div>
  );
}

// ─── SVG TORNADO ───
function TornadoChart({ data, baseBcr, width }) {
  const w = width || 800;
  const rowH = 34, labelW = 150, pad = 40;
  const chartW = w - labelW - pad * 2;
  const h = data.length * rowH + 50;
  const allVals = data.flatMap(d => [d.low, d.high]);
  const minV = Math.min(...allVals, baseBcr) * 0.9;
  const maxV = Math.max(...allVals, baseBcr) * 1.1;
  const scale = (v) => labelW + pad + ((v - minV) / (maxV - minV)) * chartW;
  const baseX = scale(baseBcr);
  const [tip, setTip] = useState(null);
  return (
    <div style={{ position: 'relative' }}>
      <svg width={w} height={h} style={{ display: 'block' }}>
        <line x1={baseX} y1={10} x2={baseX} y2={h-30} stroke="#666" strokeDasharray="4 3" strokeWidth={1.5} />
        <text x={baseX} y={h-12} textAnchor="middle" fontSize={11} fill="#666">{baseBcr.toFixed(1)}x (base)</text>
        {[minV, (minV+maxV)/2, maxV].map((v, i) => (
          <text key={i} x={scale(v)} y={h-12} textAnchor="middle" fontSize={10} fill="#9ca3af">{v.toFixed(1)}x</text>
        ))}
        {data.map((d, i) => {
          const y = 15 + i * rowH;
          const x1 = scale(d.low); const x2 = scale(d.high);
          return (
            <g key={i}>
              <text x={labelW - 8} y={y + rowH/2 + 1} textAnchor="end" fontSize={12} fill="#374151">{d.name}</text>
              <rect x={Math.min(x1, baseX)} y={y+4} width={Math.abs(baseX - x1)} height={rowH-10} fill="#93c5fd" rx={3}
                onMouseEnter={(e) => setTip({ x: e.clientX, y: e.clientY, name: d.name, low: d.low, high: d.high })}
                onMouseLeave={() => setTip(null)} style={{ cursor: 'pointer' }} />
              <rect x={Math.min(x2, baseX)} y={y+4} width={Math.abs(x2 - baseX)} height={rowH-10} fill="#4472C4" rx={3}
                onMouseEnter={(e) => setTip({ x: e.clientX, y: e.clientY, name: d.name, low: d.low, high: d.high })}
                onMouseLeave={() => setTip(null)} style={{ cursor: 'pointer' }} />
            </g>
          );
        })}
      </svg>
      {tip && <div className="tooltip-box" style={{ left: tip.x + 10, top: tip.y - 40, position: 'fixed' }}>
        <strong>{tip.name}</strong><br/>Low: {tip.low.toFixed(2)}x &nbsp; High: {tip.high.toFixed(2)}x &nbsp; Spread: {(tip.high-tip.low).toFixed(2)}
      </div>}
    </div>
  );
}

function Histogram({ data, label, thresholds, width, height }) {
  const w = width || 700, h = height || 320;
  const pad = { top: 20, right: 30, bottom: 50, left: 60 };
  const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
  if (!data || data.length === 0) return null;
  const sorted = [...data].sort((a,b) => a - b);
  const p10 = percentile(data, 10), p50 = percentile(data, 50), p90 = percentile(data, 90);
  const minV = sorted[0], maxV = sorted[sorted.length - 1];
  const nBins = 40;
  const binW = (maxV - minV) / nBins || 1;
  const bins = Array(nBins).fill(0);
  for (const v of data) { const b = Math.min(Math.floor((v - minV) / binW), nBins - 1); bins[b]++; }
  const maxBin = Math.max(...bins);
  const scaleX = v => pad.left + ((v - minV) / (maxV - minV)) * cw;
  const scaleY = v => pad.top + ch - (v / maxBin) * ch;
  const barW = cw / nBins;
  const [tip, setTip] = useState(null);
  return (
    <div style={{position:'relative'}}>
      <svg width={w} height={h} style={{display:'block'}}>
        {bins.map((count, i) => {
          const x = pad.left + i * barW;
          const bh = (count / maxBin) * ch;
          const binStart = minV + i * binW;
          const inRange = binStart + binW/2 >= p10 && binStart + binW/2 <= p90;
          return <rect key={i} x={x} y={pad.top + ch - bh} width={Math.max(barW - 1, 1)} height={bh}
            fill={inRange ? '#4472C4' : '#93c5fd'} opacity={0.85}
            onMouseEnter={e => setTip({x:e.clientX,y:e.clientY,lo:binStart.toFixed(2),hi:(binStart+binW).toFixed(2),n:count})}
            onMouseLeave={() => setTip(null)} style={{cursor:'pointer'}} />;
        })}
        <line x1={scaleX(p50)} y1={pad.top} x2={scaleX(p50)} y2={pad.top+ch} stroke="#1a1a2e" strokeWidth={2} strokeDasharray="6 3" />
        <text x={scaleX(p50)} y={pad.top-4} textAnchor="middle" fontSize={11} fill="#1a1a2e" fontWeight={600}>Median: {p50.toFixed(1)}</text>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
          const v = minV + f * (maxV - minV);
          return <text key={i} x={scaleX(v)} y={h - 8} textAnchor="middle" fontSize={10} fill="#6b7280">{v.toFixed(1)}</text>;
        })}
        <text x={w/2} y={h-2} textAnchor="middle" fontSize={12} fill="#374151">{label}</text>
        <text x={pad.left-8} y={pad.top+ch/2} textAnchor="middle" fontSize={11} fill="#6b7280" transform={`rotate(-90,${pad.left-8},${pad.top+ch/2})`}>Frequency</text>
        {thresholds && thresholds.map((t, i) => {
          const prob = (data.filter(v => v > t.value).length / data.length * 100).toFixed(0);
          return <g key={i}>
            <line x1={scaleX(t.value)} y1={pad.top} x2={scaleX(t.value)} y2={pad.top+ch} stroke={t.color||'#ef4444'} strokeWidth={1.5} strokeDasharray="4 2" />
            <text x={scaleX(t.value)+4} y={pad.top+14+i*14} fontSize={10} fill={t.color||'#ef4444'}>P(&gt;{t.label})={prob}%</text>
          </g>;
        })}
      </svg>
      {tip && <div className="tooltip-box" style={{left:tip.x+10,top:tip.y-40,position:'fixed'}}>
        Range: {tip.lo}&ndash;{tip.hi}<br/>Count: {tip.n} ({(tip.n/data.length*100).toFixed(1)}%)
      </div>}
    </div>
  );
}

function CDFChart({ data, label, width, height }) {
  const w = width || 700, h = height || 280;
  const pad = { top: 20, right: 30, bottom: 45, left: 60 };
  const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
  if (!data || data.length === 0) return null;
  const sorted = [...data].sort((a,b) => a - b);
  const minV = sorted[0], maxV = sorted[sorted.length - 1];
  const scaleX = v => pad.left + ((v - minV) / (maxV - minV)) * cw;
  const scaleY = p => pad.top + ch - p * ch;
  const step = Math.max(1, Math.floor(sorted.length / 200));
  const points = sorted.filter((_,i) => i % step === 0 || i === sorted.length - 1)
    .map((v, i, arr) => `${scaleX(v)},${scaleY((i * step) / sorted.length)}`).join(' ');
  const p10 = percentile(data, 10), p50 = percentile(data, 50), p90 = percentile(data, 90);
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      <polyline points={points} fill="none" stroke="#4472C4" strokeWidth={2} />
      {[{p:0.10,v:p10,label:'10th'},{p:0.50,v:p50,label:'50th'},{p:0.90,v:p90,label:'90th'}].map(({p,v,label:l}) => (
        <g key={l}>
          <line x1={pad.left} y1={scaleY(p)} x2={scaleX(v)} y2={scaleY(p)} stroke="#9ca3af" strokeDasharray="3 2" strokeWidth={1} />
          <line x1={scaleX(v)} y1={scaleY(p)} x2={scaleX(v)} y2={pad.top+ch} stroke="#9ca3af" strokeDasharray="3 2" strokeWidth={1} />
          <text x={pad.left-4} y={scaleY(p)+4} textAnchor="end" fontSize={10} fill="#6b7280">{(p*100).toFixed(0)}%</text>
          <text x={scaleX(v)} y={pad.top+ch+14} textAnchor="middle" fontSize={10} fill="#374151" fontWeight={500}>{v.toFixed(1)}</text>
          <circle cx={scaleX(v)} cy={scaleY(p)} r={3.5} fill="#4472C4" />
        </g>
      ))}
      {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
        const v = minV + f * (maxV - minV);
        return <text key={i} x={scaleX(v)} y={h-4} textAnchor="middle" fontSize={10} fill="#6b7280">{v.toFixed(1)}</text>;
      })}
      <text x={w/2} y={h} textAnchor="middle" fontSize={12} fill="#374151">{label}</text>
      <text x={pad.left-8} y={pad.top+ch/2} textAnchor="middle" fontSize={11} fill="#6b7280" transform={`rotate(-90,${pad.left-8},${pad.top+ch/2})`}>Cumulative Probability</text>
    </svg>
  );
}

        <div className="chart-section">
          <div className="chart-card">
            <h3>Pathway Composition</h3>
            <StackedBar data={dalyBarData} label="DALYs" width={750} />
            <div style={{height:12}}></div>
            <StackedBar data={wellbyBarData} label="WELLBYs" width={750} />
            <div style={{display:'flex', gap:16, justifyContent:'center', marginTop:14, fontSize:'0.8rem'}}>
              {Object.entries(COLORS).filter(([k])=>k!=='wellby').map(([k,c]) =>
                <span key={k} style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="idot" style={{background:c}}></span>{k.charAt(0).toUpperCase()+k.slice(1)}
                </span>
              )}
            </div>
          </div>
        </div>

        <div className="table-controls">
          <h3 style={{fontSize:'1rem', fontWeight:600, color:'#374151'}}>Pathway Detail</h3>
          <div className="view-toggle">
            <button className={!detailView?'active':''} onClick={()=>setDetailView(false)}>Summary</button>
            <button className={detailView?'active':''} onClick={()=>setDetailView(true)}>Full Model</button>
          </div>
        </div>

        <div className="pathway-table-wrap">
          <table className="pathway-table">
            <thead><tr>
              <th onClick={()=>handleSort('intervention')}>Intervention</th>
              <th onClick={()=>handleSort('outcome')}>Outcome</th>
              {detailView && <th onClick={()=>handleSort('central')}>Central Est.</th>}
              {detailView && <th>Units</th>}
              {detailView && <th>Subgroup</th>}
              {detailView && <th onClick={()=>handleSort('subgroup_n')}>N</th>}
              {detailView && <th>Baseline</th>}
              {detailView && <th onClick={()=>handleSort('raw')}>Raw Cases</th>}
              {detailView && <th onClick={()=>handleSort('overlap')}>Overlap %</th>}
              <th onClick={()=>handleSort('adj')} className={detailView?'col-group-border':''}>Adj. Cases</th>
              {detailView && <th>DALY Wt</th>}
              {detailView && <th>PV Factor</th>}
              <th onClick={()=>handleSort('dalys')}>DALYs</th>
              {detailView && <th className="col-group-border">$/Unit</th>}
              <th onClick={()=>handleSort('dollars')}>$ Benefit</th>
              {detailView && <th className="col-group-border">LS Impact</th>}
              {detailView && <th>WELLBY Dur</th>}
              <th onClick={()=>handleSort('wellbys')}>WELLBYs</th>
              <th onClick={()=>handleSort('confidence')}>Confidence</th>
              {detailView && <th>Formula</th>}
              <th>Sources</th>
              {detailView && <th>How We Got Numbers</th>}
            </tr></thead>
            <tbody>
              {sortedPathways.map(p => <tr key={p.id} className={p.new_row?'new-row':''}>
                <td><span className="idot" style={{background:COLORS[p.cat]||'#888'}}></span>{p.intervention}</td>
                <td>{p.outcome}</td>
                {detailView && <td style={{fontWeight:600}}>{fmtCentral(p.central)}</td>}
                {detailView && <td style={{color:'#6b7280'}}>{p.units}</td>}
                {detailView && <td style={{color:'#6b7280',fontSize:'0.7rem'}}>{p.subgroup_desc}</td>}
                {detailView && <td>{p.subgroup_n}</td>}
                {detailView && <td style={{color:'#6b7280',fontSize:'0.7rem'}}>{p.baseline_rate}</td>}
                {detailView && <td>{p.raw.toFixed(2)}</td>}
                {detailView && <td>{p.overlap > 0 ? (p.overlap*100).toFixed(0)+'%' : '\u2014'}</td>}
                <td className={detailView?'col-group-border':''}>{p.adj.toFixed(1)}</td>
                {detailView && <td>{p.daly_wt !== null ? p.daly_wt : '\u2014'}</td>}
                {detailView && <td>{p.pv_f < 1 ? p.pv_f.toFixed(3) : '1.0'}</td>}
                <td>{p.dalys.toFixed(2)}</td>
                {detailView && <td className="col-group-border">{p.dollar_per_unit !== null ? fmt$(p.dollar_per_unit) : '\u2014'}</td>}
                <td>{fmt$(p.dollars)}</td>
                {detailView && <td className="col-group-border">{p.ls ? p.ls.toFixed(4) : '\u2014'}</td>}
                {detailView && <td>{p.wellby_dur || '\u2014'}</td>}
                <td>{p.wellbys.toFixed(1)}</td>
                <td><ConfBadge conf={p.confidence} /></td>
                {detailView && <td style={{color:'#6b7280',fontSize:'0.68rem',maxWidth:180,whiteSpace:'normal'}}>{p.formula_note}</td>}
                <td><SourceLinks sources={SOURCES[p.id]} /></td>
                {detailView && <td style={{color:'#6b7280',fontSize:'0.68rem',maxWidth:260,whiteSpace:'normal',lineHeight:'1.3'}}>{DERIVATIONS[p.id] || '\u2014'}</td>}
              </tr>)}
              <tr style={{fontWeight:700, background:'#f9fafb'}}>
                <td colSpan={2}>Total</td>
                {detailView && <td colSpan={7}></td>}
                <td className={detailView?'col-group-border':''}></td>
                {detailView && <td colSpan={2}></td>}
                <td>{model.totalDalys.toFixed(2)}</td>
                {detailView && <td className="col-group-border"></td>}
                <td>{fmt$(model.totalDollars)}</td>
                {detailView && <td className="col-group-border" colSpan={2}></td>}
                <td>{model.totalWellbys.toFixed(1)}</td>
                <td></td>
                {detailView && <td></td>}
                <td></td>
                {detailView && <td></td>}
              </tr>
            </tbody>
          </table>
        </div>
      </div>}

      {tab==='params' && <div className="params-wrap">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <span style={{fontSize:'0.85rem',color:'#6b7280'}}>BCR ($): <strong>{model.bcrDollar.toFixed(1)}&times;</strong></span>
            <span style={{fontSize:'0.85rem',color:'#6b7280',marginLeft:20}}>BCR (WELLBY): <strong style={{color:COLORS.wellby}}>{model.bcrWellby.toFixed(1)}&times;</strong></span>
          </div>
          <button className="reset-btn" onClick={resetParams}>Reset to defaults</button>
        </div>
        <div className="param-group">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <h3 style={{fontSize:'1rem',fontWeight:600,color:'#374151',marginBottom:2}}>Iron &rarr; IQ Pathway</h3>
              <p style={{fontSize:'0.78rem',color:'#9ca3af',margin:0}}>RCT evidence at &ge;60mg/day; biofortification provides ~3&ndash;5mg. Toggle off to see impact of zeroing this pathway.</p>
            </div>
            <div className="view-toggle">
              <button className={params.iron_iq_include?'active':''} onClick={()=>handleParam('iron_iq_include', true)}>Include</button>
              <button className={!params.iron_iq_include?'active':''} onClick={()=>handleParam('iron_iq_include', false)}>Zero</button>
            </div>
          </div>
        </div>
        <ParamGroup title="Effect Sizes" sliders={EFFECT_SLIDERS} params={params} onChange={handleParam} />
        <ParamGroup title="Demographics" sliders={DEMO_SLIDERS} params={params} onChange={handleParam} defaultOpen={false} />
        <ParamGroup title="DALY Weights" sliders={DALY_SLIDERS} params={params} onChange={handleParam} defaultOpen={false} />
        <ParamGroup title="WELLBY Parameters" sliders={WELLBY_SLIDERS} params={params} onChange={handleParam} defaultOpen={false} />
        <ParamGroup title="Methodological" sliders={METHOD_SLIDERS} params={params} onChange={handleParam} defaultOpen={false} />
      </div>}

      {tab==='sensitivity' && <div className="tornado-wrap">
        <div className="chart-card">
          <h3>Tornado Chart &mdash; $ Benefit-Cost Ratio Sensitivity</h3>
          <p style={{fontSize:'0.82rem',color:'#6b7280',marginBottom:16}}>Each bar shows BCR range when parameter varies from 5th to 95th percentile. Base BCR: {model.bcrDollar.toFixed(1)}&times;</p>
          <TornadoChart data={tornadoData} baseBcr={model.bcrDollar} width={850} />
        </div>
        <div className="chart-card" style={{marginTop:16}}>
          <h3>Parameter Ranges</h3>
          <table className="pathway-table" style={{fontSize:'0.82rem'}}>
            <thead><tr><th>Parameter</th><th>5th %ile</th><th>95th %ile</th><th>BCR (low)</th><th>BCR (high)</th><th>Spread</th></tr></thead>
            <tbody>{tornadoData.map(d => {
              const tp = TORNADO_PARAMS.find(t=>t.label===d.name);
              return <tr key={d.name}><td>{d.name}</td><td>{tp?.lo}</td><td>{tp?.hi}</td><td>{d.low.toFixed(2)}&times;</td><td>{d.high.toFixed(2)}&times;</td><td>{d.range.toFixed(2)}</td></tr>;
            })}</tbody>
          </table>
        </div>
      </div>}

      {tab==='montecarlo' && <div style={{padding:24,maxWidth:1000,margin:'0 auto'}}>
        <div className="chart-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <h3 style={{margin:0}}>Monte Carlo Simulation</h3>
              <p style={{fontSize:'0.82rem',color:'#6b7280',margin:'4px 0 0'}}>Simultaneously varies {getMCParams(modelVersion).length} parameters from triangular distributions</p>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <select value={mcIterations} onChange={e=>setMcIterations(parseInt(e.target.value))}
                style={{padding:'6px 10px',borderRadius:6,border:'1px solid #d1d5db',fontSize:'0.85rem'}}>
                <option value={1000}>1,000 runs</option>
                <option value={5000}>5,000 runs</option>
                <option value={10000}>10,000 runs</option>
                <option value={20000}>20,000 runs</option>
              </select>
              <button onClick={handleRunMC} disabled={mcRunning}
                style={{padding:'8px 20px',background:mcRunning?'#9ca3af':'#4472C4',color:'white',border:'none',borderRadius:6,cursor:mcRunning?'default':'pointer',fontWeight:600,fontSize:'0.9rem'}}>
                {mcRunning ? 'Running...' : 'Run Simulation'}
              </button>
            </div>
          </div>

          {!mcResults && !mcRunning && <div style={{textAlign:'center',padding:'60px 20px',color:'#9ca3af'}}>
            <p style={{fontSize:'1.1rem',marginBottom:8}}>Click "Run Simulation" to start</p>
            <p style={{fontSize:'0.85rem'}}>The simulation samples all uncertain parameters simultaneously from their distributions, capturing compounding uncertainty that one-at-a-time sensitivity analysis misses.</p>
          </div>}

          {mcResults && <div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {[{k:'bcr',l:'BCR ($)'},{k:'costPerDaly',l:'$/DALY'},{k:'wellbys',l:'WELLBYs'},{k:'wellbyBcr',l:'BCR (WELLBY)'}].map(({k,l}) =>
                <button key={k} className={'tab-btn'+(mcMetric===k?' active':'')} onClick={()=>setMcMetric(k)}
                  style={{padding:'6px 14px',fontSize:'0.82rem',borderBottom:mcMetric===k?'3px solid #4472C4':'3px solid transparent'}}>{l}</button>
              )}
            </div>

            <Histogram data={mcResults[mcMetric]}
              label={mcMetric==='bcr'?'Benefit-Cost Ratio ($)':mcMetric==='costPerDaly'?'$/DALY':mcMetric==='wellbys'?'WELLBYs per 1,000':'BCR (WELLBY)'}
              thresholds={mcMetric==='bcr'?[{value:1,label:'1\u00d7',color:'#ef4444'},{value:3,label:'3\u00d7',color:'#f59e0b'}]:
                mcMetric==='wellbyBcr'?[{value:1,label:'1\u00d7',color:'#ef4444'}]:null}
              width={900} height={320} />

            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,margin:'20px 0',background:'#f9fafb',borderRadius:8,padding:16}}>
              <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6b7280'}}></div>
              <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6b7280',textAlign:'center'}}>10th %ile</div>
              <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6b7280',textAlign:'center'}}>Median</div>
              <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6b7280',textAlign:'center'}}>90th %ile</div>
              <div style={{fontWeight:600,fontSize:'0.82rem',color:'#6b7280',textAlign:'center'}}>Mean</div>
              {[
                {k:'bcr',l:'BCR ($)',fmt:v=>v.toFixed(1)+'\u00d7'},
                {k:'costPerDaly',l:'$/DALY',fmt:v=>'$'+Math.round(v).toLocaleString()},
                {k:'dalys',l:'DALYs/1000',fmt:v=>v.toFixed(1)},
                {k:'wellbys',l:'WELLBYs/1000',fmt:v=>v.toFixed(1)},
                {k:'costPerWellby',l:'$/WELLBY',fmt:v=>'$'+Math.round(v).toLocaleString()},
                {k:'wellbyBcr',l:'BCR (WELLBY)',fmt:v=>v.toFixed(1)+'\u00d7'},
              ].map(({k,l,fmt}) => {
                const d = mcResults[k]; const mean = d.reduce((s,v)=>s+v,0)/d.length;
                return <React.Fragment key={k}>
                  <div style={{fontWeight:500,fontSize:'0.85rem'}}>{l}</div>
                  <div style={{textAlign:'center',fontSize:'0.85rem'}}>{fmt(percentile(d,10))}</div>
                  <div style={{textAlign:'center',fontSize:'0.85rem',fontWeight:600}}>{fmt(percentile(d,50))}</div>
                  <div style={{textAlign:'center',fontSize:'0.85rem'}}>{fmt(percentile(d,90))}</div>
                  <div style={{textAlign:'center',fontSize:'0.85rem',color:'#6b7280'}}>{fmt(mean)}</div>
                </React.Fragment>;
              })}
            </div>

            <div className="chart-card" style={{background:'#f0f7ff',border:'1px solid #bfdbfe',marginBottom:16}}>
              <h3 style={{fontSize:'1rem',marginBottom:8}}>Key Probability Statements</h3>
              {(() => {
                const pBcr1 = (mcResults.bcr.filter(v=>v>1).length/mcResults.bcr.length*100).toFixed(0);
                const pBcr3 = (mcResults.bcr.filter(v=>v>3).length/mcResults.bcr.length*100).toFixed(0);
                const medCostWellby = percentile(mcResults.costPerWellby, 50);
                const loCostWellby = percentile(mcResults.costPerWellby, 10);
                const hiCostWellby = percentile(mcResults.costPerWellby, 90);
                return <div style={{fontSize:'0.95rem',lineHeight:1.8}}>
                  <p>There is a <strong>{pBcr1}%</strong> probability the program returns more than $1 for every $1 spent (BCR &gt; 1&times;).</p>
                  <p>There is a <strong>{pBcr3}%</strong> probability the program returns more than $3 for every $1 spent (BCR &gt; 3&times;).</p>
                  <p>The median cost per WELLBY is <strong>${Math.round(medCostWellby).toLocaleString()}</strong> (90% range: ${Math.round(loCostWellby).toLocaleString()}&ndash;${Math.round(hiCostWellby).toLocaleString()}).</p>
                </div>;
              })()}
            </div>

            <div className="chart-card" style={{marginBottom:16}}>
              <h3>Cumulative Distribution &mdash; {mcMetric==='bcr'?'BCR ($)':mcMetric==='costPerDaly'?'$/DALY':mcMetric==='wellbys'?'WELLBYs':'BCR (WELLBY)'}</h3>
              <CDFChart data={mcResults[mcMetric]}
                label={mcMetric==='bcr'?'Benefit-Cost Ratio ($)':mcMetric==='costPerDaly'?'$/DALY':mcMetric==='wellbys'?'WELLBYs per 1,000':'BCR (WELLBY)'}
                width={900} height={280} />
            </div>

            <div className="chart-card">
              <h3>Parameter Distributions</h3>
              <table className="pathway-table" style={{fontSize:'0.82rem'}}>
                <thead><tr><th>Parameter</th><th>Min</th><th>Mode (base)</th><th>Max</th><th>Distribution</th></tr></thead>
                <tbody>{getMCParams(modelVersion).map(p =>
                  <tr key={p.id}><td>{p.label}</td><td>{p.min}</td><td style={{fontWeight:600}}>{p.mode}</td><td>{p.max}</td><td>Triangular</td></tr>
                )}</tbody>
              </table>
            </div>
          </div>}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
