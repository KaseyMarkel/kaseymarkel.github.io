- row: "Row 6"
  common: "Stara"
  latin: "Monstera deliciosa"
  tags: ["ID to confirm"]
  notes: "The only remaininst monstera from my original batch of 3, which survived many months of almost zero light (<40 FC at daily peak) and conistent dessication due to the soil pocket being too small for it. Earned her name through a Claude transcription error, and it's stuck. I've bought several products just for her, including Cal-mag foliar spray magnesium, Kelpak kelp biostimulant, two mini-water-pockets of sphagnum moss for aerial roots to increase water supply, and most recently added a new soil pocket to do the same. After 9 months of slow decline and no new leaves, she's finally recovering and starting to grow vigorously."
  photos: [/img/living-wall/plant19.jpg]

